<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIIA MPPA | Entrada</title>
  <style>
    :root {
      --bg-main: #f3f4f6;
      --accent: #8a1f3a;
      --text-main: #1e293b;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --muted: #64748b;
      --chip: rgba(167,31,49,0.10);
      --chip-hover: rgba(167,31,49,0.18);
    }

    * { box-sizing: border-box; }
    a, a:visited, a:hover, a:active {
      color: #8a1f3a !important;
      font-weight: 600 !important;
    }
    body.dark-mode a,
    body.dark-mode a:visited,
    body.dark-mode a:hover,
    body.dark-mode a:active {
      color: #fbd246 !important;
    }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(138,31,58,0.12), transparent 38%),
        radial-gradient(circle at 85% 85%, rgba(138,31,58,0.10), transparent 35%),
        var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
    }
    body.dark-mode {
      --bg-main: #000917;
      --text-main: #f1f5f9;
      --card-bg: #0b1733;
      --border: #32486f;
      --muted: #cbd5e1;
      --chip: rgba(167,31,49,0.22);
      --chip-hover: rgba(167,31,49,0.30);
    }

    .btn-theme {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 20;
      background: var(--bg-main);
      color: var(--text-main);
      border: 2px solid var(--accent);
      border-radius: 999px;
      padding: 0.55rem 0.95rem;
      font-weight: 800;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .wrap {
      width: min(1040px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      overflow: hidden;
    }

    .hero {
      padding: 2.1rem 1.4rem 1.3rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(138,31,58,0.06) 0%, rgba(138,31,58,0.01) 100%);
    }

    @keyframes logoScale {
      from {
        transform: scale(1.28);
        opacity: 0.8;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      width: 148px;
      height: 148px;
      border-radius: 14px;
      object-fit: contain;
      box-shadow: 0 8px 22px rgba(138,31,58,0.20);
      background: #fff;
      animation: logoScale 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    h1 {
      margin: 1rem 0 0.35rem;
      color: #8a1f3a;
      font-size: clamp(1.2rem, 2.5vw, 1.9rem);
      line-height: 1.22;
    }

    .site {
      display: inline-block;
      margin-top: 0.45rem;
      padding: 0.42rem 0.9rem;
      border-radius: 999px;
      background: var(--chip);
      color: #8a1f3a;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      border: 1px solid rgba(138,31,58,0.25);
    }
    .site:hover { background: var(--chip-hover); }

    .subtitle {
      margin: 0.75rem auto 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .grid {
      padding: 1.15rem;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.9rem;
    }

    .card {
      display: block;
      text-decoration: none;
      color: #8a1f3a;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 6px solid var(--accent);
      border-radius: 14px;
      padding: 0.95rem 0.95rem 0.9rem;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
      border-color: #cbd5e1;
    }
    body.dark-mode .card:hover {
      box-shadow: 0 12px 24px rgba(2, 8, 23, 0.55);
      border-color: #5b77a6;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }
    .topic-icon {
      width: 20px;
      height: 20px;
      color: var(--accent);
      flex: 0 0 auto;
    }

    .tag {
      display: inline-block;
      color: #8a1f3a;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0.35rem;
    }

    .title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.28;
      color: #8a1f3a;
    }

    .desc {
      margin: 0.38rem 0 0;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .footer {
      padding: 0 1.15rem 1.1rem;
      color: var(--muted);
      font-size: 0.83rem;
      text-align: center;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .logo { width: 122px; height: 122px; }
      .logos { gap: 0.7rem; }
      .site { font-size: 0.98rem; }
    }
  </style>
</head>
<body>
  <button class="btn-theme" onclick="toggleTheme()">🌓 TEMA</button>
  <main class="wrap">
    <section class="hero">
      <div class="logos">
        <img src="logo.png" alt="Logo MPPA" class="logo">
        <img src="mppa.png" alt="Símbolo MPPA" class="logo">
      </div>
      <h1><!-- AUTO:TITLE --></h1>
      <a class="site" href="https://ciia.mppa.mp.br" target="_blank" rel="noopener noreferrer">ciia.mppa.mp.br</a>
      <p class="subtitle"><!-- AUTO:SUBTITLE --></p>
    </section>

    <section class="grid">
      <!-- AUTO:CARDS:START -->
      <!-- AUTO:CARDS:END -->
    </section>

    <div class="footer"><!-- AUTO:FOOTER --></div>
  </main>
  <script>
    function toggleTheme() {
      document.body.classList.toggle("dark-mode");
      localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
    }
    (function applySavedTheme() {
      const saved = localStorage.getItem("theme");
      if (saved === "dark") {
        document.body.classList.add("dark-mode");
      } else {
        document.body.classList.remove("dark-mode");
      }
    })();
  </script>
</body>
</html>
